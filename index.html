<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
</head>
<body>
<style>
 *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:fadeIn 0.6s ease;
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

label{
font-size:14px;
font-weight:600;
color:#444;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
transition:all 0.3s ease;
}

input:focus{
outline:none;
border-color:#667eea;
box-shadow:0 0 4px rgba(102,126,234,0.5);
}

small{
display:block;
margin-bottom:8px;
color:red;
font-size:12px;
}

/* password box */

.password-box{
display:flex;
align-items:center;
}

.password-box input{
flex:1;
}

.password-box button{
margin-left:6px;
padding:8px 12px;
border:none;
background:#667eea;
color:white;
border-radius:6px;
cursor:pointer;
font-size:12px;
transition:0.3s;
}

.password-box button:hover{
background:#5563d1;
}

/* strength bar */

.strength{
height:7px;
background:#eee;
border-radius:10px;
margin:6px 0 10px 0;
overflow:hidden;
}

#strengthBar{
height:100%;
width:0%;
transition:0.3s;
}

/* submit button */

button[type="submit"]{
width:100%;
padding:12px;
background:#667eea;
border:none;
border-radius:8px;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button[type="submit"]:hover{
background:#5563d1;
transform:translateY(-1px);
}

/* animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
<div class="container">
<h2>Registration Form</h2>

<form id="form">

<label>Name</label>
<input type="text" id="name">
<small id="nameError"></small>

<label>Email</label>
<input type="text" id="email">
<small id="emailError"></small>

<label>Phone</label>
<input type="text" id="phone">
<small id="phoneError"></small>

<label>Password</label>
<div class="password-box">
<input type="password" id="password">
<button type="button" id="togglePassword">Show</button>
</div>

<div class="strength">
<div id="strengthBar"></div>
</div>
<small id="passwordError"></small>

<button type="submit">Register</button>

</form>
</div>

<script src="script.js"></script>
</body>
</html>
